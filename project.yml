name: DogTracker
options:
  bundleIdPrefix: com.levijohnson
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    WATCHOS_DEPLOYMENT_TARGET: "10.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf
    exactVersion: 1.36.1
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    minVersion: 6.25.0
    maxVersion: 7.0.0
targets:
  DogTracker:
    type: application
    platform: iOS
    sources:
      - path: DogTracker
      - path: Shared
    dependencies:
      - package: SwiftProtobuf
      - package: MapLibre
        product: MapLibre
      - target: DogTrackerWatch
        embed: true
    info:
      path: DogTracker/Info.plist
      properties:
        CFBundleDisplayName: PawMesh
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "2"
        UILaunchScreen: {}
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSBluetoothAlwaysUsageDescription: >-
          PawMesh connects to your LoRa mesh radio over Bluetooth
          to receive GPS positions from your dog trackers.
        NSLocationWhenInUseUsageDescription: >-
          Your location is shown on the map and used to compute
          the bearing and distance from you to each dog.
        NSLocationAlwaysAndWhenInUseUsageDescription: >-
          Continued location access lets PawMesh keep logging
          your dogs' positions while the screen is off.
        NSPhotoLibraryUsageDescription: >-
          Pick a photo of each dog to show on the map marker.
        UIBackgroundModes:
          - bluetooth-central
          - location
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.levijohnson.DogTracker
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: LV3P9K7AFP
        CODE_SIGN_ENTITLEMENTS: DogTracker/DogTracker.entitlements
  DogTrackerWatch:
    type: application
    platform: watchOS
    sources:
      - path: DogTrackerWatch
      - path: Shared
    dependencies:
      - target: DogTrackerWatchComplication
        embed: true
    info:
      path: DogTrackerWatch/Info.plist
      properties:
        CFBundleDisplayName: PawMesh
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "2"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.levijohnson.DogTracker
        WKWatchOnly: false
        WKRunsIndependentlyOfCompanionApp: false
        NSLocationWhenInUseUsageDescription: >-
          PawMesh reads your watch's compass so the arrow points
          toward each dog as you turn your wrist.
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - pawmesh
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.levijohnson.DogTracker.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SUPPORTED_PLATFORMS: "watchsimulator watchos"
        SDKROOT: watchos
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: LV3P9K7AFP
        CODE_SIGN_ENTITLEMENTS: DogTrackerWatch/DogTrackerWatch.entitlements
  DogTrackerWatchComplication:
    type: app-extension
    platform: watchOS
    sources:
      - path: DogTrackerWatchComplication
      - path: Shared
    info:
      path: DogTrackerWatchComplication/Info.plist
      properties:
        CFBundleDisplayName: PawMesh Complication
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "2"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.levijohnson.DogTracker.watchkitapp.complication
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SUPPORTED_PLATFORMS: "watchsimulator watchos"
        SDKROOT: watchos
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: LV3P9K7AFP
        CODE_SIGN_ENTITLEMENTS: DogTrackerWatchComplication/DogTrackerWatchComplication.entitlements
  DogTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DogTrackerTests
    dependencies:
      - target: DogTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.levijohnson.DogTrackerTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  DogTracker:
    build:
      targets:
        DogTracker: all
        DogTrackerWatch: all
        DogTrackerWatchComplication: all
        DogTrackerTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DogTrackerTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  DogTrackerWatch:
    build:
      targets:
        DogTrackerWatch: all
        DogTrackerWatchComplication: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
